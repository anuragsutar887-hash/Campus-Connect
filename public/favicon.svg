<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#3b5bdb"/>
    </linearGradient>
  </defs>
  <!-- Background fills the entire square, no rounding so it fills tab perfectly -->
  <rect width="100" height="100" fill="url(#bg)"/>
  <!-- Letter C shape -->
  <path d="M62 28 A26 26 0 1 0 62 72 L62 62 A16 16 0 1 1 62 38 Z" fill="white"/>
  <!-- Chat bubble inside C opening -->
  <rect x="48" y="39" width="20" height="14" rx="4" fill="white"/>
  <polygon points="52,53 57,60 62,53" fill="white"/>
  <!-- Three dots in bubble -->
  <circle cx="53" cy="46" r="1.8" fill="url(#bg)"/>
  <circle cx="58" cy="46" r="1.8" fill="url(#bg)"/>
  <circle cx="63" cy="46" r="1.8" fill="url(#bg)"/>
</svg>
